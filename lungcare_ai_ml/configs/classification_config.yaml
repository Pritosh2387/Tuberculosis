model:
  architecture: "densenet121"
  num_classes: 6
  task: "multiclass"
  pretrained: true
  freeze_backbone: false
  dropout_rate: 0.3
  label_smoothing: 0.1

  architectures:
    resnet50:
      target_layer: "layer4"
      feature_dim: 2048
    densenet121:
      target_layer: "features.denseblock4"
      feature_dim: 1024
    efficientnet_b0:
      target_layer: "features"
      feature_dim: 1280
    vit_b16:
      target_layer: "blocks.11"
      feature_dim: 768
      patch_size: 16
      img_size: 224

classes:
  - "Healthy"
  - "Tuberculosis"
  - "Pneumonia"
  - "COVID-19"
  - "Lung Cancer"
  - "Pulmonary Fibrosis"

class_weights:
  Healthy: 1.0
  Tuberculosis: 2.5
  Pneumonia: 1.5
  COVID-19: 2.0
  Lung Cancer: 3.0
  Pulmonary Fibrosis: 2.5

input:
  image_size: 224
  channels: 3
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

training:
  epochs: 50
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: "adamw"
  mixed_precision: true
  gradient_clip_val: 1.0
  accumulation_steps: 1
  val_check_interval: 1
  log_every_n_steps: 10

  early_stopping:
    enabled: true
    patience: 10
    min_delta: 1.0e-4
    monitor: "val_loss"
    mode: "min"

  scheduler:
    name: "cosine_annealing"
    warmup_epochs: 5
    T_max: 50
    eta_min: 1.0e-7

  checkpointing:
    save_top_k: 3
    monitor: "val_f1"
    mode: "max"
    save_last: true
    filename_template: "{epoch:03d}-{val_f1:.4f}"

data:
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  class_balancing: "weighted_sampler"
  cache_dataset: false
  cache_format: "pt"

  datasets:
    nih_chestxray14:
      enabled: true
      root: "data/raw/nih_chestxray14"
      label_file: "Data_Entry_2017.csv"
      image_dir: "images"

    montgomery:
      enabled: true
      root: "data/raw/montgomery"
      abnormal_dir: "CXR_png/abnormal"
      normal_dir: "CXR_png/normal"

    shenzhen:
      enabled: true
      root: "data/raw/shenzhen"
      abnormal_dir: "CXR_png/abnormal"
      normal_dir: "CXR_png/normal"

    rsna_pneumonia:
      enabled: true
      root: "data/raw/rsna_pneumonia"
      label_file: "stage_2_train_labels.csv"
      image_dir: "stage_2_train_images"

    covid_qu_ex:
      enabled: true
      root: "data/raw/covid_qu_ex"
      split_dirs:
        train: "train"
        val: "val"
        test: "test"
