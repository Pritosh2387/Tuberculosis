project:
  name: "LungCare AI"
  version: "1.0.0"
  description: "Explainable deep learning system for chest X-ray and CT scan analysis"

paths:
  data_root: "data"
  raw_data: "data/raw"
  processed_data: "data/processed"
  cache_dir: "data/cache"
  splits_dir: "data/splits"
  checkpoints_dir: "checkpoints"
  outputs_dir: "outputs"
  logs_dir: "logs"
  reports_dir: "outputs/reports"
  heatmaps_dir: "outputs/heatmaps"
  masks_dir: "outputs/masks"
  overlays_dir: "outputs/overlays"
  healthy_references_dir: "data/healthy_references"

device:
  use_cuda: true
  cuda_device: 0
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2

reproducibility:
  seed: 42
  deterministic: false

logging:
  level: "INFO"
  log_to_file: true
  log_file: "logs/lungcare_ai.log"
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"

wandb:
  enabled: false
  project: "lungcare-ai"
  entity: null
  tags: []
  notes: ""
  mode: "online"

tensorboard:
  enabled: true
  log_dir: "logs/tensorboard"
  flush_secs: 30
