classification:
  train:
    - name: "Resize"
      params:
        height: 224
        width: 224
    - name: "HorizontalFlip"
      params:
        p: 0.5
    - name: "ShiftScaleRotate"
      params:
        shift_limit: 0.05
        scale_limit: 0.10
        rotate_limit: 15
        border_mode: 0
        p: 0.5
    - name: "RandomBrightnessContrast"
      params:
        brightness_limit: 0.20
        contrast_limit: 0.20
        p: 0.40
    - name: "GaussNoise"
      params:
        var_limit: [10.0, 50.0]
        p: 0.30
    - name: "GridDistortion"
      params:
        num_steps: 5
        distort_limit: 0.3
        p: 0.20
    - name: "CLAHE"
      params:
        clip_limit: 4.0
        p: 0.30
    - name: "CoarseDropout"
      params:
        max_holes: 8
        max_height: 20
        max_width: 20
        min_holes: 1
        fill_value: 0
        p: 0.20
    - name: "Normalize"
      params:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}

  val:
    - name: "Resize"
      params:
        height: 224
        width: 224
    - name: "Normalize"
      params:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}

  test:
    - name: "Resize"
      params:
        height: 224
        width: 224
    - name: "Normalize"
      params:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}

segmentation:
  train:
    - name: "Resize"
      params:
        height: 256
        width: 256
    - name: "HorizontalFlip"
      params:
        p: 0.5
    - name: "ShiftScaleRotate"
      params:
        shift_limit: 0.05
        scale_limit: 0.10
        rotate_limit: 10
        border_mode: 0
        p: 0.5
    - name: "ElasticTransform"
      params:
        alpha: 120
        sigma: 12
        p: 0.30
    - name: "RandomBrightnessContrast"
      params:
        brightness_limit: 0.15
        contrast_limit: 0.15
        p: 0.40
    - name: "GaussNoise"
      params:
        var_limit: [5.0, 30.0]
        p: 0.30
    - name: "CLAHE"
      params:
        clip_limit: 4.0
        p: 0.30
    - name: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}

  val:
    - name: "Resize"
      params:
        height: 256
        width: 256
    - name: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}

  test:
    - name: "Resize"
      params:
        height: 256
        width: 256
    - name: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]
        max_pixel_value: 255.0
    - name: "ToTensorV2"
      params: {}
