model:
  classification:
    checkpoint_path: null
    architecture: "densenet121"
    num_classes: 6
    task: "multiclass"

  segmentation:
    checkpoint_path: null
    architecture: "attention_unet"
    in_channels: 1
    out_channels: 1

  device: "auto"

classes:
  - "Healthy"
  - "Tuberculosis"
  - "Pneumonia"
  - "COVID-19"
  - "Lung Cancer"
  - "Pulmonary Fibrosis"

input:
  image_size: 224
  channels: 3
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

explainability:
  method: "gradcam_plus_plus"
  target_layer: "features.denseblock4"
  alpha_overlay: 0.4
  save_raw_heatmap: true

  architecture_target_layers:
    resnet50: "layer4"
    densenet121: "features.denseblock4"
    efficientnet_b0: "features"
    vit_b16: null

thresholds:
  binary_classification: 0.5
  disease_confidence: 0.30
  abnormal_region_area_px: 500
  mask_binarization: 0.5
  opacity_severity_mild: 0.30
  opacity_severity_moderate: 0.60

postprocessing:
  heatmap_colormap: "jet"
  morphological_cleanup: true
  morph_kernel_size: 5
  min_contour_area: 200
  region_padding_px: 10

output:
  save_heatmap: true
  save_mask: true
  save_overlay: true
  save_annotated: true
  output_dir: "outputs/inference"
  report_format: "json"

healthy_reference:
  enabled: true
  reference_dir: "data/healthy_references"
  comparison_method: "ssim"
  ssim_window_size: 11
  histogram_bins: 256
