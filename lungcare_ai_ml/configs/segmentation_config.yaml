model:
  architecture: "attention_unet"
  in_channels: 1
  out_channels: 1
  features: [64, 128, 256, 512]
  bilinear: true
  dropout_rate: 0.2

  architectures:
    unet:
      bilinear: true
      features: [64, 128, 256, 512]
    attention_unet:
      bilinear: true
      features: [64, 128, 256, 512]
    unet_plus_plus:
      bilinear: true
      features: [32, 64, 128, 256, 512]
      deep_supervision: true

input:
  image_size: 256
  channels: 1
  normalize_mean: [0.5]
  normalize_std: [0.5]

loss:
  name: "combined"
  dice_weight: 0.5
  bce_weight: 0.3
  focal_weight: 0.2
  focal_gamma: 2.0
  focal_alpha: 0.25
  smooth: 1.0e-6

metrics:
  - "dice"
  - "iou"
  - "precision"
  - "recall"
  - "sensitivity"
  - "specificity"

training:
  epochs: 100
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: "adamw"
  mixed_precision: true
  gradient_clip_val: 1.0
  accumulation_steps: 2
  val_check_interval: 1
  log_every_n_steps: 20

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 1.0e-4
    monitor: "val_dice"
    mode: "max"

  scheduler:
    name: "reduce_on_plateau"
    factor: 0.5
    patience: 7
    min_lr: 1.0e-7

  checkpointing:
    save_top_k: 3
    monitor: "val_dice"
    mode: "max"
    save_last: true
    filename_template: "{epoch:03d}-{val_dice:.4f}"

data:
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  class_balancing: "none"
  cache_dataset: false

  datasets:
    siim_acr_pneumothorax:
      enabled: true
      root: "data/raw/siim_acr"
      image_dir: "dicom-images-train"
      mask_dir: "masks"
      label_file: "train-rle.csv"

    montgomery_masks:
      enabled: true
      root: "data/raw/montgomery"
      image_dir: "CXR_png"
      left_mask_dir: "ManualMask/leftMask"
      right_mask_dir: "ManualMask/rightMask"

    covid_qu_ex_seg:
      enabled: true
      root: "data/raw/covid_qu_ex"
      image_dir: "images"
      mask_dir: "infection_masks"

    mosmeddata:
      enabled: true
      root: "data/raw/mosmeddata"
      ct_dir: "studies"
      mask_dir: "masks"

    lidc_idri:
      enabled: true
      root: "data/raw/lidc_idri"
      nodule_size_threshold: 3
