# ──────────────────────────────────────────────────────────────────────────────
# LungCare AI — Master Configuration (config.yaml)
#
# Edit this file to control every aspect of the pipeline.
# Run scripts/train.py --config config.yaml to start training.
# ──────────────────────────────────────────────────────────────────────────────

project:
  name: "LungCare AI"
  version: "2.0.0"
  seed: 42

data:
  # Raw dataset folders (populated by scripts/download_datasets.py)
  montgomery_dir: "data/montgomery"
  shenzhen_dir:   "data/shenzhen"

  # Split CSVs (generated by scripts/prepare_data.py)
  train_csv:  "data/splits/train.csv"
  val_csv:    "data/splits/val.csv"
  test_csv:   "data/splits/test.csv"

  # 2-class default (TB binary). Change num_classes to 6 for full 6-class mode.
  # Six-class order: Normal, Tuberculosis, Pneumonia, COVID-19, Lung Cancer, Pulmonary Fibrosis
  class_names:
    - "Normal"
    - "Tuberculosis"
  num_classes:  2
  image_size:   224
  num_workers:  4

model:
  # Options: resnet50 | densenet121 | efficientnet_b0 | vit_b16
  architecture: "resnet50"
  pretrained:   true
  dropout_rate: 0.3

training:
  epochs:       50
  batch_size:   32
  lr:           1.0e-4
  weight_decay: 1.0e-2
  grad_clip:    1.0
  amp:          true        # Automatic Mixed Precision (CUDA only)
  scheduler:    "cosine"    # cosine | step | plateau
  patience:     10          # early stopping patience
  monitor:      "val_f1_macro"
  monitor_mode: "max"
  checkpoint_dir: "checkpoints"
  log_dir:        "logs"

loss:
  type:             "cross_entropy"   # cross_entropy | focal | label_smoothing
  label_smoothing:  0.1
  focal_alpha:      0.25
  focal_gamma:      2.0

inference:
  checkpoint_path:    "checkpoints/best.pth"
  device:             "cpu"      # cpu | cuda
  explainability:     "gradcam"  # gradcam | rollout | none
  run_segmentation:   false
  seg_checkpoint:     null
  threshold:          0.5
  top_k:              3
  api_host:           "0.0.0.0"
  api_port:           8000
